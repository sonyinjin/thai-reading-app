<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ไม้บรรทัดสะกดคำ V.Ultimate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --con-c: #2D3436; 
            --vow-c: #0984E3; 
            --tone-c: #D63031; 
            --final-c: #00B894;
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-grad);
            overflow: hidden;
        }

        /* --- Main Container --- */
        .app-container {
            width: 95%;
            max-width: 900px;
            height: 92vh;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 6px solid #fff;
            position: relative;
        }

        /* --- Display Zone (แก้เรื่อง Spacing สระ) --- */
        .display-card {
            background: #fff;
            height: 35%;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .word-result {
            font-size: clamp(80px, 20vw, 130px);
            font-weight: 800;
            line-height: 1;
            display: flex;
            align-items: baseline;
            justify-content: center;
            letter-spacing: -2px; /* ดึงตัวอักษรมาชิดกันแบบภาษาไทยมาตรฐาน */
        }

        /* การจัดการสีแยกตามประเภท */
        .c-con { color: var(--con-c); }
        .c-vow { color: var(--vow-c); }
        .c-tone { color: var(--tone-c); }
        .c-final { color: var(--final-c); }

        .reading-guide {
            font-size: 20px;
            color: #636e72;
            margin-top: 10px;
            font-weight: 600;
            background: #f1f2f6;
            padding: 5px 20px;
            border-radius: 50px;
        }

        /* --- Ruler Section --- */
        .ruler-system {
            flex: 1;
            display: flex;
            gap: 10px;
            background: #2d3436;
            border-radius: 25px;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .active-window {
            position: absolute;
            top: 50%;
            left: 10px;
            right: 10px;
            height: 70px;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            pointer-events: none;
            z-index: 5;
        }

        .ruler-col {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            z-index: 2;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ruler-col.hidden {
            flex: 0;
            opacity: 0;
            pointer-events: none;
        }

        .ruler-col::-webkit-scrollbar { display: none; }

        .ruler-content {
            padding: 100px 0; /* Center first/last items */
        }

        .slot {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #b2bec3;
            scroll-snap-align: center;
            transition: 0.3s;
        }

        .slot.active {
            font-size: 45px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* --- Control Panel --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 5px;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }

        .btn-toggle { background: #dfe6e9; color: #2d3436; }
        .btn-toggle.on { background: var(--primary); color: #fff; }
        .btn-random { background: #fdcb6e; color: #d35400; }
        .btn-speak { background: #00b894; color: #fff; grid-column: span 1; }
        .btn-theme { background: #a29bfe; color: #fff; }

        /* Helpers */
        .mid { color: #f1c40f; } .high { color: #e74c3c; } .low { color: #3498db; }

        @media (max-width: 600px) {
            .app-container { height: 98vh; width: 98%; border-radius: 20px; padding: 10px; }
            .word-result { font-size: 90px; }
            .btn span { display: none; } /* ซ่อนตัวหนังสือในปุ่มถ้าจอเล็กมาก */
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="display-card" onclick="playFullSpell()">
        <div id="resDiv" class="word-result"></div>
        <div id="readDiv" class="reading-guide">แตะเพื่อฟัง</div>
    </div>

    <div class="ruler-system">
        <div class="active-window"></div>
        
        <div id="leadRuler" class="ruler-col hidden" data-type="lead">
            <div id="leadList" class="ruler-content"></div>
        </div>
        
        <div id="conRuler" class="ruler-col" data-type="con">
            <div id="conList" class="ruler-content"></div>
        </div>

        <div id="clusterRuler" class="ruler-col hidden" data-type="cluster">
            <div id="clusterList" class="ruler-content"></div>
        </div>

        <div id="vowRuler" class="ruler-col" data-type="vow">
            <div id="vowList" class="ruler-content"></div>
        </div>

        <div id="finalRuler" class="ruler-col" data-type="final">
            <div id="finalList" class="ruler-content"></div>
        </div>

        <div id="toneRuler" class="ruler-col" data-type="tone">
            <div id="toneList" class="ruler-content"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-toggle" id="btn-lead" onclick="toggleRuler('lead')">๑ <span>อักษรนำ</span></button>
        <button class="btn btn-toggle" id="btn-cluster" onclick="toggleRuler('cluster')">๒ <span>ควบกล้ำ</span></button>
        <button class="btn btn-random" onclick="randomize()">🎲 <span>สุ่มคำ</span></button>
        <button class="btn btn-theme" onclick="cycleTheme()">🎨 <span>ธีม</span></button>
        <button class="btn btn-speak" onclick="playFullSpell()">🔊 <span>อ่าน</span></button>
    </div>
</div>

<script>
    const midCons = "กจดตบปอฎฏ".split("");
    const highCons = "ขฉถผฝสหศษฐฃ".split("");
    const lowCons = "คงชซทนพฟมยรลวฮญณฑฒธภฬฆฌฅ".split("");
    const allCons = [...midCons, ...lowCons, ...highCons];
    
    const vowelMap = {"-ะ":"สระอะ","-า":"สระอา","-ิ":"สระอิ","-ี":"สระอี","-ึ":"สระอึ","-ื":"สระอือ","-ุ":"สระอุ","-ู":"สระอู","เ-ะ":"สระเอะ","เ-":"สระเอ","แ-ะ":"สระแอะ","แ-":"สระแอ","โ-ะ":"สระโอะ","โ-":"สระโอ","เ-าะ":"สระเอาะ","-อ":"สระออ","เ-อะ":"สระเออะ","เ-อ":"สระเออ","เ-า":"สระเอา","-ำ":"สระอำ","เ-ีย":"สระเอีย","เ-ือ":"สระเอือ","-ัว":"สระอัว"};
    const tones = ["", "่", "้", "๊", "๋"];
    const toneNames = {"่": "ไม้เอก", "้": "ไม้โท", "๊": "ไม้ตรี", "๋": "ไม้จัตวา"};
    
    let state = { lead: "", con: "ก", cluster: "", vow: "-า", final: "", tone: "" };
    let synth = window.speechSynthesis;

    function init() {
        populate('leadList', ["", "ห", "อ"], 'lead');
        populateConsonants();
        populate('clusterList', ["", "ร", "ล", "ว"], 'cluster');
        populate('vowList', Object.keys(vowelMap), 'vow');
        populate('finalList', ["","ก","ง","ด","น","บ","ม","ย","ว"], 'final');
        populate('toneList', tones, 'tone');

        document.querySelectorAll('.ruler-col').forEach(setupScroll);
        updateUI();
    }

    function populate(id, list, type) {
        const container = document.getElementById(id);
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'slot';
            div.textContent = item === "" ? (type === 'tone' ? '○' : '—') : item;
            container.appendChild(div);
        });
    }

    function populateConsonants() {
        const container = document.getElementById('conList');
        allCons.forEach(c => {
            const div = document.createElement('div');
            div.className = `slot ${midCons.includes(c)?'mid':highCons.includes(c)?'high':'low'}`;
            div.textContent = c;
            container.appendChild(div);
        });
    }

    function setupScroll(el) {
        const type = el.dataset.type;
        const list = getListByType(type);

        el.addEventListener('scroll', () => {
            clearTimeout(el.timer);
            el.timer = setTimeout(() => {
                const center = el.scrollTop + el.offsetHeight / 2;
                const items = el.querySelectorAll('.slot');
                let closestIdx = 0;
                let minDiff = Infinity;

                items.forEach((item, i) => {
                    const diff = Math.abs((item.offsetTop + item.offsetHeight / 2) - center);
                    if (diff < minDiff) { minDiff = diff; closestIdx = i; }
                    item.classList.remove('active');
                });

                if (state[type] !== list[closestIdx]) {
                    state[type] = list[closestIdx];
                    items[closestIdx].classList.add('active');
                    if (navigator.vibrate) navigator.vibrate(10);
                    speakSingle(state[type], type);
                    updateUI();
                }
            }, 50);
        });
    }

    function getListByType(type) {
        if(type === 'lead') return ["", "ห", "อ"];
        if(type === 'con') return allCons;
        if(type === 'cluster') return ["", "ร", "ล", "ว"];
        if(type === 'vow') return Object.keys(vowelMap);
        if(type === 'final') return ["","ก","ง","ด","น","บ","ม","ย","ว"];
        if(type === 'tone') return tones;
    }

    function updateUI() {
        let { lead, con, cluster, vow, final, tone } = state;
        let base = lead + con + cluster;
        let word = "";

        // Thai Grammar Logic for Vowels
        if (final !== "") {
            if (vow === "-ะ") word = base + "ั" + final;
            else if (vow === "เ-ะ") word = "เ" + base + "็" + final;
            else if (vow === "แ-ะ") word = "แ" + base + "็" + final;
            else if (vow === "โ-ะ") word = base + final;
            else if (vow === "เ-อ") word = (final === "ย") ? "เ" + base + "ย" : "เ" + base + "ิ" + final;
            else if (vow === "-ัว") word = base + "ว" + final;
            else if (vow === "-อ" && final === "ร") word = base + final;
            else word = vow.replace('-', base) + final;
        } else {
            word = vow.replace('-', base);
        }

        // Tone Placement Logic
        if (tone !== "") {
            let pos = (lead || cluster) ? 2 : 1;
            const upperMarks = ["ั", "ิ", "ี", "ึ", "ื", "็"];
            if (upperMarks.includes(word[pos])) {
                word = word.slice(0, pos+1) + tone + word.slice(pos+1);
            } else {
                word = word.slice(0, pos) + tone + word.slice(pos);
            }
        }

        // Render with colors
        let html = "";
        for (let char of word) {
            let cls = "c-con";
            if ("ัิีึืุู็เแโอาำียือัว".includes(char)) cls = "c-vow";
            else if (tones.includes(char)) cls = "c-tone";
            else if (char === final) cls = "c-final";
            html += `<span class="${cls}">${char}</span>`;
        }
        document.getElementById('resDiv').innerHTML = html;
    }

    function speakSingle(val, type) {
        if (!val) return;
        synth.cancel();
        let txt = val;
        if (type === 'vow') txt = vowelMap[val];
        else if (type === 'tone') txt = toneNames[val];
        else txt = val + "อ";
        
        let utter = new SpeechSynthesisUtterance(txt);
        utter.lang = 'th-TH';
        utter.rate = 1.2;
        synth.speak(utter);
    }

    function playFullSpell() {
        let { lead, con, cluster, vow, final, tone } = state;
        let word = document.getElementById('resDiv').innerText;
        let spell = `${lead?lead+'อ ':''}${con}อ ${cluster?cluster+'อ ':''}${vowelMap[vow].replace('สระ','')}${final?' '+final+'อ':''}${tone?' '+toneNames[tone]:''} อ่านว่า ${word}`;
        
        synth.cancel();
        let utter = new SpeechSynthesisUtterance(spell);
        utter.lang = 'th-TH';
        utter.rate = 0.9;
        synth.speak(utter);
    }

    function toggleRuler(t) {
        const r = document.getElementById(t+'Ruler');
        const b = document.getElementById('btn-'+t);
        r.classList.toggle('hidden');
        b.classList.toggle('on');
        if(r.classList.contains('hidden')) state[t] = "";
        updateUI();
    }

    function randomize() {
        const v = Object.keys(vowelMap);
        state.con = allCons[Math.floor(Math.random()*allCons.length)];
        state.vow = v[Math.floor(Math.random()*v.length)];
        state.final = ["","ก","ง","ด","น","บ","ม","ย"][Math.floor(Math.random()*8)];
        updateUI();
        playFullSpell();
    }

    let themeIdx = 0;
    function cycleTheme() {
        const grads = [
            'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)',
            'linear-gradient(135deg, #E8F5E9 0%, #81C784 100%)',
            'linear-gradient(135deg, #FFF9C4 0%, #FBC02D 100%)',
            'linear-gradient(135deg, #FCE4EC 0%, #F06292 100%)'
        ];
        themeIdx = (themeIdx + 1) % grads.length;
        document.body.style.background = grads[themeIdx];
    }

    window.onload = init;
</script>
</body>
</html>
